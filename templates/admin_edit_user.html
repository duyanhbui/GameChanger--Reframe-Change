<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User - Reframe Change</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <style>body { background-color: #f8f9fa; }</style>
</head>
<body>
    {% include 'nav_bar.html' %}
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="h3 fw-bold">Edit User: {{ edit_user.username }}</h1>
                    <a href="{{ url_for('admin_users') }}" class="btn btn-outline-secondary">
                        <i data-feather="arrow-left" class="me-1"></i>Back
                    </a>
                </div>

                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show">
                    {{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}{% endif %}{% endwith %}

                <div class="card">
                    <div class="card-body p-4">
                        <form method="POST">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">First Name</label>
                                    <input type="text" name="first_name" class="form-control" value="{{ edit_user.first_name or '' }}">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Last Name</label>
                                    <input type="text" name="last_name" class="form-control" value="{{ edit_user.last_name or '' }}">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control" value="{{ edit_user.email }}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">New Password <small class="text-muted">(leave blank to keep current)</small></label>
                                <input type="password" name="new_password" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Role</label>
                                <select name="role" class="form-select">
                                    <option value="change_manager" {{ 'selected' if edit_user.role == 'change_manager' }}>Change Manager</option>
                                    <option value="admin" {{ 'selected' if edit_user.role == 'admin' }}>Admin</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="is_active_user" id="is_active_user" {{ 'checked' if edit_user.is_active_user }}>
                                    <label class="form-check-label" for="is_active_user">Account Active</label>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Company Access</label>
                                <div class="border rounded p-3" style="max-height: 200px; overflow-y: auto;">
                                    {% for company in companies %}
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="company_ids" value="{{ company.id }}" id="company_{{ company.id }}" {{ 'checked' if company.id in user_company_ids }}>
                                        <label class="form-check-label" for="company_{{ company.id }}">{{ company.name }}</label>
                                    </div>
                                    {% endfor %}
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i data-feather="save" class="me-2"></i>Save Changes
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>feather.replace();</script>
</body>
</html>
